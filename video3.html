<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa Video</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #222;
            font-family: sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }
        video {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        p {
            margin-top: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
<video controls autoplay muted playsinline>
    <source src="video/clip3.mp4" type="video/mp4">
    Il tuo browser non supporta il video.
</video>
<p>Un momento da ricordare... 🎉</p>
</body>
</html>
